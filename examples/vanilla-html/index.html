<!DOCTYPE html>
<html>
<body>
<h2>Checkout</h2>
<button id="geophrase-btn">Select Delivery Address</button>
<p id="result"></p>

<script src="../../packages/core/src/index.js" type="module"></script>

<script type="module">
  // 2. Initialize
  Geophrase.initialize('YOUR_API_KEY_HERE');

  // 3. Open on click
  document.getElementById('geophrase-btn').onclick = () => {
    Geophrase.open({
      orderId: '12345',
      phone: '9999999999',
      onSuccess: (address) => {
        document.getElementById('result').innerText = 'Saved: ' + address.phrase;
      }
    });
  };
</script>
</body>
</html>
