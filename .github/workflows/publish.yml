name: Publish to NPM

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./packages/react/package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag exists. Skipping publish."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "New version detected!"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and Push Git Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.get_version.outputs.version }}
          git push origin ${{ steps.get_version.outputs.version }}

      - name: Publish Workspaces to NPM
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          npm publish --workspace=packages/core --access public --provenance
          npm publish --workspace=packages/react --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}