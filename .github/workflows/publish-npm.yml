name: Publish to NPM

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify workspace versions match
        run: |
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          REACT_VERSION=$(node -p "require('./packages/react/package.json').version")
          if [ "$CORE_VERSION" != "$REACT_VERSION" ]; then
            echo "::error::Version mismatch: core=$CORE_VERSION, react=$REACT_VERSION"
            exit 1
          fi

      - name: Extract version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./packages/react/package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          git fetch --tags
          if git tag -l | grep -q "^${{ steps.get_version.outputs.version }}$"; then
            echo "::warning::Version ${{ steps.get_version.outputs.version }} already published. Skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "New version detected!"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish Workspaces to NPM
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          npm publish --workspace=packages/core --access public --provenance
          npm publish --workspace=packages/react --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and Push Git Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.get_version.outputs.version }}
          git push origin ${{ steps.get_version.outputs.version }}