name: Deploy Geophrase CDN SDK

on:
  push:
    branches:
      - main
    paths:
      - 'packages/core/src/index.js'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Replace export with Window/CommonJS bindings
        run: |
          node -e "
          const fs = require('fs');
          const filePath = 'packages/core/src/index.js';
          let code = fs.readFileSync(filePath, 'utf8');
          
          const replacement = \`if (typeof window !== 'undefined') {
              window.Geophrase = Geophrase;
          }
          
          if (typeof module !== 'undefined' && module.exports) {
              module.exports = Geophrase;
              module.exports.default = Geophrase;
          }\`;
          
          // Replace the specific export line
          code = code.replace('export default Geophrase;', replacement);
          fs.writeFileSync(filePath, code);
          "

      - name: Minify with Terser
        run: |
          npx --yes terser packages/core/src/index.js --compress --mangle --output geophrase.js

      - name: Copy minified SDK to GCP Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "geophrase.js"
          target: "/home/iqbal/js-sdk/v1"