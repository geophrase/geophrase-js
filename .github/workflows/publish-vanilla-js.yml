name: Deploy Geophrase CDN SDK

on:
  push:
    branches:
      - main
    paths:
      - 'packages/core/src/index.js'
      - '.github/workflows/publish-vanilla-js.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Verify Export Pattern
        run: |
          if ! grep -q "export default Geophrase;" packages/core/src/index.js; then
            echo "::error::Expected export pattern not found in source. The build script needs updating."
            exit 1
          fi

      - name: Build CDN bundle
        run: |
          mkdir -p dist
          node -e "
          const fs = require('fs');
          let code = fs.readFileSync('packages/core/src/index.js', 'utf8');
          
          const replacement = \`if (typeof window !== 'undefined') {
              window.Geophrase = Geophrase;
          }
          
          if (typeof module !== 'undefined' && module.exports) {
              module.exports = Geophrase;
              module.exports.default = Geophrase;
          }\`;
          
          code = code.replace('export default Geophrase;', replacement);
          fs.writeFileSync('dist/geophrase.js', code);
          "

      - name: Minify with Terser
        run: |
          npx --yes terser dist/geophrase.js \
            --compress --mangle \
            --source-map "url='geophrase.js.map'" \
            --output dist/geophrase.js

      - name: Prepare Server Staging Directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/iqbal/js-sdk/v1/.staging

      - name: Copy files to Server Staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/geophrase.js,dist/geophrase.js.map"
          target: "/home/iqbal/js-sdk/v1/.staging"
          strip_components: 1

      - name: Atomically swap in the new files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mv /home/iqbal/js-sdk/v1/.staging/geophrase.js /home/iqbal/js-sdk/v1/geophrase.js
            mv /home/iqbal/js-sdk/v1/.staging/geophrase.js.map /home/iqbal/js-sdk/v1/geophrase.js.map
            rm -rf /home/iqbal/js-sdk/v1/.staging